services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: victus
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: victus_agent
    ports:
      - "5432:5432"
    volumes:
      - victus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U victus -d victus_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  victus_postgres_data:
